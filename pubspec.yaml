name: keepyourvow
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database — sqflite replaces Isar (no AGP conflicts)
  sqflite: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.0

  # Navigation
  go_router: ^13.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Notifications + background tasks
  flutter_local_notifications: ^17.1.2
  workmanager: ^0.9.0+3

  # Permissions
  permission_handler: ^11.3.1
  installed_apps: ^1.4.0

  # Authentication
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2

  # Audio
  audioplayers: ^6.1.0

  # Onboarding flag
  shared_preferences: ^2.2.3

  # Timezone for notifications
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
